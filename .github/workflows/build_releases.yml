name: "Build Linux and macOS Releases"

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  SOURCE_REPO: "ChiSonKon/tg-sender-studio"
  PY_VERSION: "3.11"

jobs:
  build-linux:
    name: "Linux Build (Ubuntu)"
    runs-on: ubuntu-latest
    steps:
      - name: "Install System Dependencies"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends             zip unzip curl libxkbcommon-x11-0 libgl1 libglib2.0-0 libegl1 libdbus-1-3 libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 xvfb

      - name: "Clone Private Source"
        run: |
          git clone https://x-access-token:${{ secrets.RELEASE_PAT }}@github.com/${{ env.SOURCE_REPO }}.git src
          
      - name: "Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PY_VERSION }}

      - name: "Install Build Deps"
        run: |
          python -m pip install --upgrade pip --quiet
          python -m pip install pyinstaller==5.13.2 tinyaes --quiet
          python -m pip install -r src/基础版/requirements.txt --quiet || true
          python -m pip install -r src/进阶版/requirements.txt --quiet || true
          python -m pip install -r src/完全版/requirements.txt --quiet || true

      - name: "Build Basic Edition"
        run: |
          cd src/基础版
          xvfb-run --auto-servernum pyinstaller --clean "TG_Bulk_Sender_Linux.spec"
          mkdir -p /tmp/artifacts
          cd dist && zip -r /tmp/artifacts/WhiteCat_TG_Assistant_Basic_Linux.zip WhiteCat_TG_Assistant_Basic/

      - name: "Build Advanced Edition"
        run: |
          cd src/进阶版
          xvfb-run --auto-servernum pyinstaller --clean "TG_Bulk_Sender_Linux.spec"
          cd dist && zip -r /tmp/artifacts/WhiteCat_TG_Assistant_Advanced_Linux.zip WhiteCat_TG_Assistant_Advanced/

      - name: "Build Complete Edition"
        run: |
          cd src/完全版
          xvfb-run --auto-servernum pyinstaller --clean "TG_Bulk_Sender_Linux.spec"
          cd dist && zip -r /tmp/artifacts/WhiteCat_TG_Assistant_Complete_Linux.zip WhiteCat_TG_Assistant_Complete/

      - name: "Upload Artifacts to Release"
        run: |
          python3 src/ci/upload_to_release.py /tmp/artifacts RELEASE_PAT
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}

  build-macos:
    name: "macOS Build (Sonoma)"
    runs-on: macos-14
    steps:
      - name: "Clone Private Source"
        run: |
          git clone https://x-access-token:${{ secrets.RELEASE_PAT }}@github.com/${{ env.SOURCE_REPO }}.git src
          
      - name: "Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PY_VERSION }}

      - name: "Install Build Deps"
        run: |
          python -m pip install --upgrade pip --quiet
          python -m pip install pyinstaller==5.13.2 tinyaes --quiet
          python -m pip install -r src/基础版/requirements.txt --quiet || true
          python -m pip install -r src/进阶版/requirements.txt --quiet || true
          python -m pip install -r src/完全版/requirements.txt --quiet || true

      - name: "Build Basic Edition"
        run: |
          cd src/基础版
          pyinstaller --clean "TG_Bulk_Sender_Mac.spec"
          mkdir -p ~/artifacts
          cd dist && zip -r ~/artifacts/WhiteCat_TG_Assistant_Basic_macOS.zip WhiteCat_TG_Assistant_Basic/

      - name: "Build Advanced Edition"
        run: |
          cd src/进阶版
          pyinstaller --clean "TG_Bulk_Sender_Mac.spec"
          cd dist && zip -r ~/artifacts/WhiteCat_TG_Assistant_Advanced_macOS.zip WhiteCat_TG_Assistant_Advanced/

      - name: "Build Complete Edition"
        run: |
          cd src/完全版
          pyinstaller --clean "TG_Bulk_Sender_Mac.spec"
          cd dist && zip -r ~/artifacts/WhiteCat_TG_Assistant_Complete_macOS.zip WhiteCat_TG_Assistant_Complete/

      - name: "Upload Artifacts to Release"
        run: |
          python3 src/ci/upload_to_release.py ~/artifacts RELEASE_PAT
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
